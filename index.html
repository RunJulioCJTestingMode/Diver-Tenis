<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TieBreak - Renta de Canchas de Tenis</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="glass-container">
        <header>
            <div class="logo-wrapper">
                <img src="logo.png" alt="Diver Tenis Logo" class="logo">
            </div>
            <h1>TieBreak 🎾</h1>
            <p>Reserva tu cancha y domina el juego</p>
        </header>

        <section class="court-selector">
            <button class="court-btn active" data-court="1">Cancha 1</button>
            <button class="court-btn" data-court="2">Cancha 2</button>
            <button class="court-btn" data-court="3">Cancha 3</button>
        </section>

        <section class="booking-grid-wrapper">
            <div id="booking-grid" class="booking-grid">
                <!-- Slots will be generated by JS -->
            </div>
        </section>
    </main>

    <!-- Payment Modal -->
    <div id="payment-modal" class="modal hidden">
        <div class="modal-content glass-card">
            <h2>Confirmar Reserva</h2>
            <script src="https://www.paypal.com/sdk/js?client-id=real=MXN"></script>
            <div id="booking-details"></div>
            <div class="price-tag">Precio: $200.00 MXN / hora</div>
            <div class="payment-form">
                <div id="paypal-button-container"></div>
                <button id="close-modal" class="secondary-btn">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
